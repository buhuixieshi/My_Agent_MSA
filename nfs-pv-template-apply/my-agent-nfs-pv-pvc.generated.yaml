apiVersion: v1
kind: Namespace
metadata:
  name: agent
---
# ============================================================
# My_Agent MSA NFS PV/PVC
#
# 由 apply-nfs-pv.sh 通过 envsubst/sed 渲染生成。
#
# 注意：
#   storageClassName: ""
#   是必须的，用来避免默认 StorageClass，比如 standard，
#   干扰手写静态 NFS PV/PVC 的绑定。
#
# 变量：
#   172.29.219.49 -> NFS server IP 或域名
#   /srv/nfs/my-agent   -> NFS export 根路径，例如 /srv/nfs/my-agent
# ============================================================

apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-agent-config-pv
spec:
  storageClassName: ""
  capacity:
    storage: 2Gi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 172.29.219.49
    path: /srv/nfs/my-agent/config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-agent-config-pvc
  namespace: agent
spec:
  storageClassName: ""
  accessModes:
  - ReadWriteMany
  volumeName: my-agent-config-pv
  resources:
    requests:
      storage: 2Gi
---
