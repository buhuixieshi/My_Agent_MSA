syntax = "proto3";

package agent_orchestrator.v1;

message ExecuteTaskRequest {
  string task_id = 1;
  string user_id = 2;
  string session_id = 3;
  string channel = 4;
  string content = 5;
  string created_at = 6;
  map<string, string> metadata = 7;
}

message DeliveryTarget {
  string channel = 1;
  string user_id = 2;
  string conversation_id = 3;
  string reply_to = 4;
}

message TaskEvent {
  string event_id = 1;
  string task_id = 2;
  string user_id = 3;
  string session_id = 4;
  string channel = 5;
  string type = 6;
  string text = 7;
  repeated string images = 8;
  int32 waiting = 9;
  string error = 10;
  DeliveryTarget delivery_target = 11;
  map<string, string> metadata = 12;
}

service AgentOrchestrator {
  rpc ExecuteTask(ExecuteTaskRequest) returns (stream TaskEvent);
}
