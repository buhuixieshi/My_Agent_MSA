apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking-context-service
  namespace: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openviking-context-service
  template:
    metadata:
      labels:
        app: openviking-context-service
    spec:
      containers:
        - name: openviking-context-service
          image: agent/openviking-context-service:v17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5301
          env:
            - name: OPENVIKING_CONTEXT_GRPC_PORT
              value: "5301"
            - name: OPENVIKING_BACKEND
              value: "server"
            - name: OPENVIKING_SERVER_URL
              value: "http://openviking.agent.svc.cluster.local:1933"
            - name: OPENVIKING_API_KEY
              value: "dev-local-openviking-key"
            - name: OPENVIKING_ACCOUNT
              value: "my-agent"
            - name: OPENVIKING_FILE_FALLBACK
              value: "false"
            - name: MOCK_VIKING
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: openviking-context-service
  namespace: agent
spec:
  selector:
    app: openviking-context-service
  ports:
    - name: grpc
      port: 5301
      targetPort: 5301
  type: ClusterIP
