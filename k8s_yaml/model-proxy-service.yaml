apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: model-serving
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:8000"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: agent
spec:
  type: ClusterIP
  selector:
    app: model-serving
  ports:
    - name: http
      port: 8000
      targetPort: 8000