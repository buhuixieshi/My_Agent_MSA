apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend-web
        image: frontend-web:v1  # 等下打包的镜像名
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-web
  namespace: agent
spec:
  selector:
    app: frontend-web
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP