apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-runtime-service
  namespace: agent
  labels:
    app: tool-runtime-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-runtime-service
  template:
    metadata:
      labels:
        app: tool-runtime-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: tool-runtime-service
          image: agent/tool-runtime-service:v2
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 5303
          env:
            - name: TOOL_RUNTIME_HOST
              value: "0.0.0.0"
            - name: TOOL_RUNTIME_PORT
              value: "5303"
            - name: WORKSPACE_DIR
              value: "/app/workspace"
            - name: ENABLE_SHELL_TOOLS
              value: "false"
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: my-agent-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tool-runtime-service
  namespace: agent
  labels:
    app: tool-runtime-service
spec:
  type: ClusterIP
  selector:
    app: tool-runtime-service
  ports:
    - name: grpc
      port: 5303
      targetPort: 5303
