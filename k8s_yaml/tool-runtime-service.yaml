apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-runtime-service
  namespace: agent
  labels:
    app: tool-runtime-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-runtime-service
  template:
    metadata:
      labels:
        app: tool-runtime-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: tool-runtime-service
          image: agent/tool-runtime-service:v20
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 5303
          env:
            - name: TOOL_RUNTIME_HOST
              value: "0.0.0.0"
            - name: TOOL_RUNTIME_PORT
              value: "5303"
            - name: WORKSPACE_DIR
              value: "/app/workspace"
            - name: ENABLE_SHELL_TOOLS
              value: "false"

            # ClawHub 下载：由 Pod SSH 到 Windows portproxy，再转发到 WSL
            - name: CLAW_DOWNLOAD_MODE
              value: "external-vm"
            - name: CLAW_EXTERNAL_VM_HOST
              value: "host.docker.internal"
            - name: CLAW_EXTERNAL_VM_USER
              value: "djw"
            - name: CLAW_EXTERNAL_VM_PORT
              value: "2222"
            - name: CLAW_EXTERNAL_VM_CLAWHUB_BIN
              value: "/usr/local/bin/clawhub"
            - name: CLAW_EXTERNAL_VM_SKILL_ROOT_DIR
              value: "/srv/nfs/my-agent/workspace/skill"
            - name: CLAW_EXTERNAL_VM_SSH_KEY
              value: "/app/ssh/my_agent_tool_runtime"
            - name: CLAW_EXTERNAL_VM_STRICT_HOST_KEY_CHECKING
              value: "false"

            # OpenViking：对齐 openviking-context-service
            - name: OPENVIKING_SERVER_URL
              value: "http://openviking.agent.svc.cluster.local:1933"
            - name: OPENVIKING_ACCOUNT
              value: "my-agent"
            - name: OPENVIKING_API_KEY
              value: "dev-local-openviking-key"
            - name: OPENVIKING_USER
              value: "tool-runtime"
            - name: OPENVIKING_AGENT
              value: "tool-runtime"

          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
            - name: tool-runtime-ssh-key
              mountPath: /app/ssh
              readOnly: true

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: my-agent-workspace-pvc
        - name: tool-runtime-ssh-key
          secret:
            secretName: tool-runtime-ssh-key
            defaultMode: 0400

---
apiVersion: v1
kind: Service
metadata:
  name: tool-runtime-service
  namespace: agent
  labels:
    app: tool-runtime-service
spec:
  type: ClusterIP
  selector:
    app: tool-runtime-service
  ports:
    - name: grpc
      port: 5303
      targetPort: 5303