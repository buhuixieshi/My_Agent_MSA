apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 11434
---
apiVersion: v1
kind: Endpoints
metadata:
  name: model-serving
  namespace: agent
subsets:
  - addresses:
      - ip: 172.29.208.1
    ports:
      - name: http
        port: 11434