server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index login.html;

    location = / {
        return 302 /login.html;
    }

    location /login.html {
        try_files /login.html =404;
    }

    location /chat.html {
        try_files /chat.html =404;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}