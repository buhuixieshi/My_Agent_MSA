<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            font-family: 微软雅黑;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 10px #00000010;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0099ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:active {
            background: #0077cc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>用户登录</h2>
        <!-- 表单直接POST到网关 /do_login -->
        <form action="/do_login" method="POST">
            <input type="text" name="user_id" placeholder="输入用户ID" required>
            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
