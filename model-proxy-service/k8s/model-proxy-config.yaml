apiVersion: v1
kind: ConfigMap
metadata:
  name: model-proxy-config
  namespace: agent
data:
  model_list.json: |
    {
      "default": "main",
      "models": {
        "main": {
          "provider": "openai_compatible",
          "api_url": "https://api.moonshot.cn/v1/chat/completions",
          "method": "POST",
          "model": "kimi-k2-thinking",
          "api_key_env": "MOONSHOT_API_KEY",
          "temperature": 0.7,
          "model_params": {}
        },
        "tool": {
          "provider": "ollama",
          "api_url": "http://model-serving:8000/api/chat",
          "method": "POST",
          "model": "qwen3.5:9b",
          "temperature": 0.7,
          "model_params": {
            "options": {
              "num_ctx": 131072,
              "num_predict": 8192
            }
          }
        },
        "reader": {
          "provider": "openai_compatible",
          "api_url": "https://api.moonshot.cn/v1/chat/completions",
          "method": "POST",
          "model": "kimi-k2-thinking",
          "api_key_env": "MOONSHOT_API_KEY",
          "temperature": 0.3,
          "model_params": {}
        }
      },
      "aliases": {
        "default-main": "main",
        "default-tool": "tool",
        "default-reader": "reader",
        "dujiawei-main": "main",
        "dujiawei-tool": "tool"
      }
    }
